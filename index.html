<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoEconOrbit — Global Intelligence Map</title>
    <meta name="description" content="Real-time geopolitical intelligence platform. Track military assets, economic corridors, cyber warfare, and strategic analysis on an interactive global map." />
    <meta name="theme-color" content="#070B14" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.heatmap@0.2.0/dist/leaflet-heatmap.js"></script>
  </head>
  <body>
    <!-- Tactical Intel Loader -->
    <div id="intel-loader" style="position:fixed;inset:0;background:#010308;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease,visibility 0.4s;">
      <div style="width:100px;height:100px;border:2px solid #3B82F6;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
      <div style="margin-top:20px;color:#3B82F6;font-family:sans-serif;letter-spacing:4px;font-size:10px;text-transform:uppercase;font-weight:900;">Initializing Protocol v8.0</div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <script>
      (function(){
        setTimeout(function(){
          const l = document.getElementById('intel-loader');
          if(l){ l.style.opacity='0'; l.style.visibility='hidden'; setTimeout(() => l.remove(), 400); }
        }, 200);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
